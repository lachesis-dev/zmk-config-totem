# ============================================================
# config/totem_right.conf
# 右半分 (Peripheral) 固有の設定
# ============================================================

# 右は常に Peripheral
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
# 右側も BLE 接続を有効にする
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=n

CONFIG_ZMK_BATTERY_REPORTING=y