# ============================================================
# config/totem_left.conf
# 左半分 (Central) 固有の設定
# ============================================================
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# 左が Central (ホストへの接続を担当)
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# USB 有効 (PC に USB ケーブルで直接接続できるようにする)
CONFIG_ZMK_USB=y

# BLE も有効
CONFIG_ZMK_BLE=y

# Bluetoothペアリング時にPC画面に表示されるPINコード入力を必須にする設定
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# ---------- XIAO nRF52840 固有 ----------
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# --- ZMK Studio（USB RPC）を有効化 ---
CONFIG_ZMK_STUDIO=y
# 💡 古い有線シリアル設定(CONFIG_USB_CDC_ACM等)やRPCの重複指定は競合を避けるためすべて削除しました
