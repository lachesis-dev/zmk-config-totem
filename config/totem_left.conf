# ============================================================
# config/totem_left.conf
# 左半分 (Central) 固有の設定
# ============================================================
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# 左が Central (ホストへの接続を担当)
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# USB 有効 (PC に USB ケーブルで直接接続できるようにする)
# ZMK v0.3 では CONFIG_ZMK_USB が USB スタックも自動で有効化する
CONFIG_ZMK_USB=y

# BLE も有効 (USB なしでワイヤレス接続する場合)
CONFIG_ZMK_BLE=y

# Bluetoothペアリング時にPC画面に表示されるPINコード入力を必須にする設定
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# ---------- XIAO nRF52840 固有 ----------
# バッテリー電圧 ADC 読み取りを有効化
# CONFIG_ZMK_BATTERY_REPORTING は CONFIG_ZMK_BLE が有効なら自動で有効になる
# バッテリー残量の定期報告 (10 分ごと)
CONFIG_ZMK_BATTERY_REPORTING=y
# バッテリーレベル通知間隔 (秒)。デフォルト 60 のため明示指定は任意
# CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60
# バッテリー残量プロキシ (Peripheral からバッテリー残量を取得してホストに通知する)  
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# --- USBコンポジット（HIDとシリアルを共存させる）を強制化 ---
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y

# シリアルログバックエンドも強制ON
CONFIG_LOG=y
CONFIG_LOG_BACKEND_USB=y
CONFIG_ZMK_USB_LOGGING=y
# ============================================================
# ドングル構成に変更する場合:
#   下記をコメントアウトして、代わりに ROLE_CENTRAL=n にする
#
# CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n  ← Peripheral に変更
# CONFIG_ZMK_USB=n                 ← USB 不要
# ============================================================
