# ============================================================
# config/totem_left.conf
# 左半分 (Central) 固有の設定
# ============================================================
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# 左が Central (ホストへの接続を担当)
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# USB 有効 (PC に USB ケーブルで直接接続できるようにする)
CONFIG_ZMK_USB=y

# BLE も有効
CONFIG_ZMK_BLE=y

# Bluetoothペアリング時にPC画面に表示されるPINコード入力を必須にする設定
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n

# Bluetoothの接続の安定性を向上させる設定
CONFIG_BT_CTLR_PHY_2M=n

# ---------- XIAO nRF52840 固有 ----------
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# --- ZMK Studio（USB RPC）を有効化 ---

# --- Zephyr 3.5.0用の有線シリアル・ログ強制有効化設定 ---
# CONFIG_USB_DEVICE_STACK=y
# CONFIG_USB_CDC_ACM=y
# CONFIG_SERIAL=y
# CONFIG_UART_LINE_CTRL=y
# CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y

# ログをUSBシリアルへ確実に流す
# CONFIG_LOG=y
# CONFIG_LOG_BACKEND_USB=y
# CONFIG_ZMK_USB_LOGGING=y

# ZMK Studioの旧環境用コアON
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

